<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  background: radial-gradient(circle at center, #2a001f, #000);
  color: white;
  font-family: 'Poppins', sans-serif;
}

/* SLIDESHOW */
.slider {
  position: fixed;
  width: 100%;
  height: 100vh;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transform: scale(1.15);
  filter: brightness(0.7) contrast(1.1);
  transition: opacity 1.5s ease, transform 6s ease;
}

.slide.active {
  opacity: 1;
  transform: scale(1);
}

/* OVERLAY (UNCHANGED) */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,0,120,0.3), rgba(0,0,0,0.8));
  backdrop-filter: blur(10px);
}

/* CONTENT */
.content {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  pointer-events: none;
  padding: 20px;
}

/* TITLE (WHITE NOW) */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 4rem;
  color: #ffffff;
  text-shadow: 0 0 20px rgba(255,255,255,0.6);
  margin-bottom: 20px;
  animation: fadeUp 2s ease;
}

/* TEXT (WHITE NOW) */
p {
  font-size: 1.2rem;
  max-width: 600px;
  line-height: 1.6;
  color: #ffffff;
  background: rgba(255,255,255,0.08);
  padding: 15px 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: opacity 0.5s ease;
  animation: fadeUp 2.5s ease;
}

/* CONTROLS */
.controls {
  position: absolute;
  bottom: 40px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
}

button {
  pointer-events: all;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  backdrop-filter: blur(8px);
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: rgba(255,100,150,0.3);
  transform: scale(1.1);
}

/* ANIMATION */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
/* LOVE SLIDE (SPECIAL) */
.love-slide {
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, rgba(255,0,120,0.3), #000);
}

/* BIG TEXT */
.love-text {
  font-family: 'Great Vibes', cursive;
  font-size: 5rem;
  color: #ffffff;
  text-align: center;
  text-shadow: 0 0 30px rgba(255,255,255,0.9);
  animation: loveFade 2s ease;
}

/* ANIMATION */
@keyframes loveFade {
  from {
    opacity: 0;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="slider">

  <div class="slide active" style="background-image:url('m3-2.jpeg')"></div>
  <div class="slide" style="background-image:url('m3-4.jpeg')"></div>
  <div class="slide" style="background-image:url('m3-5.jpeg')"></div>
<div class="slide love-slide">
  <div class="love-text">I love you so much ❤️</div>
</div>

  <div class="overlay"></div>

  <div class="content">
    <h1>Bujjii Broo❤️</h1>
    <p id="caption">Happyy 3 months babygirl</p>
  </div>

  <div class="controls">
    <button onclick="prevSlide()">◀</button>
    <button onclick="nextSlide()">▶</button>
  </div>

</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const slides = document.querySelectorAll('.slide');
let index = 0;

const captions = [
  "Thanks for choosing me 🥺",
  "You make everything feel lighter ❤️",
  "I’d choose you, again and again 💖",
  "I LOVE YOU SOOOOOOO MUCHHHH ❤️" // ← this fixes the love slide
];
function showSlide(i) {
  slides.forEach(s => s.classList.remove('active'));
  slides[i].classList.add('active');

  const caption = document.getElementById("caption");
  caption.style.opacity = 0;

  setTimeout(() => {
    caption.innerText = captions[i];
    caption.style.opacity = 1;
  }, 300);
}

function nextSlide() {
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prevSlide() {
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}

setInterval(nextSlide, 10000);

/* HEART PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

for (let i = 0; i < 100; i++) {
  hearts.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 6 + 2,
    speed: Math.random() * 1 + 0.5
  });
}

function drawHeart(x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - size, y - size, x - size * 2, y + size, x, y + size * 2);
  ctx.bezierCurveTo(x + size * 2, y + size, x + size, y - size, x, y);
  ctx.fillStyle = "rgba(255,100,150,0.7)";
  ctx.fill();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  hearts.forEach(h => {
    h.y -= h.speed;
    if (h.y < 0) h.y = canvas.height;

    drawHeart(h.x, h.y, h.size);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
